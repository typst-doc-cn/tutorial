schema: spec-driven

context: |
  When a change is archived and syncs or creates canonical specs under
  `openspec/specs/`, review each resulting `## Purpose` section before calling
  the archive complete.
  Replace any autogenerated placeholder like
  `TBD - created by archiving change ...` with a concise, domain-specific
  purpose statement that describes the capability.

rules:
  specs:
    - Every spec in `openspec/specs/*/spec.md` must include a concrete `## Purpose` section.
    - Never leave the autogenerated archive placeholder in a canonical spec purpose; replace it before reporting archive success.
